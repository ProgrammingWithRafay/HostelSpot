<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HostelSpot</title>
    <meta name="description" content="Verified boys hostels in Faisalabad for Pakistani university students. Book online with a refundable Rs. 750 deposit. Compare prices, amenities and reviews." />
    <meta name="keywords" content="hostel faisalabad, boys hostel, student hostel, UAF hostel, UCP hostel, hostel booking pakistan" />
    <meta property="og:title" content="HostelSpot" />
    <meta property="og:description" content="Verified boys hostels in Faisalabad. Book online with a refundable deposit." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0f4c75" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://supabase.co">
    
    <!-- Defer non-critical CSS -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"></noscript>

    <!-- Inline Critical CSS -->
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; font-family: system-ui, -apple-system, sans-serif; }
      #splash { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; }
      .spinner { width: 40px; height: 40px; border: 4px solid #f1f5f9; border-top-color: #0f172a; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 24px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .brand-title { font-size: 28px; font-weight: 800; color: #0f172a; letter-spacing: -0.05em; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <div class="brand-title">HostelSpot</div>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
